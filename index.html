<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mahmoud & Nagham - 3D Love Race</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
            --mahmoud: #00d2ff;
            --nagham: #ff4b1f;
            --gold: #ffd700;
            --text: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            display: flex; flex-direction: column; gap: 10px;
            padding-bottom: 80px; /* Space for controls */
        }

        /* --- Anniversary Counter --- */
        #love-counter {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .love-title { font-size: 0.9rem; color: #fab1a0; margin-bottom: 5px; }
        .timer-display { font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; }
        .timer-unit { font-size: 0.8rem; color: #aaa; display: block; margin-top: 2px;}

        /* --- UI Cards --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px; margin: 5px;
        }

        /* --- Header / Bank --- */
        .bank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .player-score-box { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .avatar-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
        .score-val { font-size: 1.2rem; font-family: sans-serif; }
        
        /* --- 3D Game Container --- */
        #game-container {
            position: relative;
            width: 100%;
            height: 350px; /* Taller for 3D view */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        canvas { display: block; width: 100%; height: 100%; outline: none; }

        /* HUD Overlay */
        #game-hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 10px;
            display: flex; justify-content: space-between; pointer-events: none;
            text-shadow: 0 2px 4px #000; font-weight: bold;
        }
        .hud-target { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; border: 1px solid #fff; }

        /* Start/Result Overlay */
        #game-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; text-align: center;
        }
        
        .btn-3d {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            border: none; padding: 12px 30px; border-radius: 30px; color: #fff;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.1s; width: 80%;
        }
        .btn-3d:active { transform: scale(0.95); }

        /* Controls */
        #controls-area {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        #jump-btn-large {
            pointer-events: all;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2); border: 2px solid #fff;
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        #jump-btn-large:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }

        /* Logs */
        #log-container {
            height: 120px; overflow-y: auto; font-size: 0.85rem;
            display: flex; flex-direction: column; gap: 5px;
        }
        .log-item {
            background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px;
            border-right: 3px solid #555;
        }
        .log-win { border-color: var(--gold); color: #fff; background: rgba(255, 215, 0, 0.1); }
        .log-loss { border-color: var(--nagham); color: #ffcccc; background: rgba(255, 75, 31, 0.1); }

        /* Selection Screen */
        #select-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 5000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .char-select-btn {
            width: 200px; padding: 20px; border-radius: 15px; border: 2px solid #fff;
            background: transparent; color: #fff; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .char-select-btn.m-btn:hover { background: var(--mahmoud); border-color: var(--mahmoud); box-shadow: 0 0 20px var(--mahmoud); }
        .char-select-btn.n-btn:hover { background: var(--nagham); border-color: var(--nagham); box-shadow: 0 0 20px var(--nagham); }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 6000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #222; border: 1px solid #444; padding: 25px; border-radius: 20px;
            width: 85%; text-align: center; color: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from{transform:scale(0.5); opacity:0;} to{transform:scale(1); opacity:1;} }

        .result-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .win-text { color: var(--gold); }
        .lose-text { color: var(--nagham); }
        .money-change { font-size: 2rem; margin: 15px 0; font-family: monospace; }
        .btn-close { background: #555; color: #fff; border: none; padding: 10px 30px; border-radius: 10px; margin-top: 15px; cursor: pointer;}
    </style>
    <!-- Import Three.js as module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

<!-- Selection Screen -->
<div id="select-screen">
    <h1 style="color:white; margin-bottom:30px;">من يلعب؟</h1>
    <button class="char-select-btn m-btn" onclick="selectChar('mahmoud')">🔵 Mahmoud</button>
    <button class="char-select-btn n-btn" onclick="selectChar('nagham')">🔴 Nagham</button>
</div>

<!-- Anniversary Counter -->
<div id="love-counter">
    <div class="love-title">❤️ ده يوم حبنا (من 20/11/2024)</div>
    <div class="timer-display" id="timer">Loading...</div>
</div>

<!-- Bank Section -->
<div class="card">
    <div class="bank-header">
        <div class="player-score-box">
            <div class="avatar-dot" style="background:var(--mahmoud)"></div>
            <span style="color:#ccc">Mahmoud</span>
            <span class="score-val" id="score-m">0</span>
        </div>
        <div style="font-size:0.9rem; color:#888;">المحفظة المشتركة</div>
        <div class="player-score-box">
            <span class="score-val" id="score-n">0</span>
            <span style="color:#ccc">Nagham</span>
            <div class="avatar-dot" style="background:var(--nagham)"></div>
        </div>
    </div>
</div>

<!-- 3D Game Area -->
<div id="game-container">
    <div id="game-hud">
        <div>هدف الفوز: <span id="target-val">50</span></div>
        <div>مستواي: <span id="my-score-val" style="color:var(--gold)">0</span></div>
    </div>
    
    <div id="game-overlay">
        <h2 id="overlay-msg" style="color:#fff; margin-bottom:20px;">انتظار الشريك...</h2>
        <p id="sub-msg" style="color:#aaa; font-size:0.9rem; margin-bottom:20px;">ابدأ السباق أول ما يتجهز الاثنين</p>
        <button id="start-btn" class="btn-3d" onclick="requestStart()" disabled>جاري التجهيز...</button>
    </div>
    <!-- Canvas injected by Three.js here -->
</div>

<!-- Logs -->
<div class="card" id="log-container">
    <div class="log-item">أهلاً بكما في السباق ثلاثي الأبعاد!</div>
</div>

<!-- Controls -->
<div id="controls-area">
    <div id="jump-btn-large"><i class="fas fa-plane"></i></div>
</div>

<!-- Result Modal -->
<div id="result-modal" class="modal">
    <div class="modal-content">
        <div id="res-icon" style="font-size:3rem; margin-bottom:10px;"></div>
        <div id="res-title" class="result-title"></div>
        <div id="res-desc" style="color:#bbb; margin-bottom:10px;"></div>
        <div id="res-money" class="money-change"></div>
        <button class="btn-close" onclick="closeResult()">تم</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';

    // --- 1. Anniversary Logic ---
    const START_DATE = new Date('2024-11-20T00:00:00');
    function updateTimer() {
        const now = new Date();
        const diff = now - START_DATE;
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        
        document.getElementById('timer').innerHTML = `
            ${days} يوم  <span style="font-size:0.8em; color:#666">|</span>  
            ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}
        `;
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- 2. Firebase Setup ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, runTransaction, push, onDisconnect } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhQDPwYPwPPWUnFaeVga9iGejDNkLgXH0",
        authDomain: "nagam-12f98.firebaseapp.com",
        projectId: "nagam-12f98",
        storageBucket: "nagam-12f98.firebasestorage.app",
        messagingSenderId: "489197943984",
        appId: "1:489197943984:web:2b1823691e8e525b288f75",
        measurementId: "G-LB7V0QWTYP"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Global State
    let myRole = localStorage.getItem('role');
    let gameRunning = false;
    let myScore = 0;
    const WIN_SCORE = 50; // The target to reach
    const STAKE_AMOUNT = 20; // Money transferred on win/loss

    // DOM Elements
    const scoreMEl = document.getElementById('score-m');
    const scoreNEl = document.getElementById('score-n');
    const myScoreValEl = document.getElementById('my-score-val');
    const overlay = document.getElementById('game-overlay');
    const overlayMsg = document.getElementById('overlay-msg');
    const subMsg = document.getElementById('sub-msg');
    const startBtn = document.getElementById('start-btn');
    const logContainer = document.getElementById('log-container');

    // --- Auth & Listeners ---
    window.selectChar = function(role) {
        myRole = role;
        localStorage.setItem('role', role);
        document.getElementById('select-screen').style.display = 'none';
        initGame();
        listenToDB();
    };

    if(myRole) {
        document.getElementById('select-screen').style.display = 'none';
        initGame();
        listenToDB();
    }

    function addLog(html, type) {
        const div = document.createElement('div');
        div.className = 'log-item ' + (type === 'win' ? 'log-win' : (type === 'loss' ? 'log-loss' : ''));
        div.innerHTML = html;
        logContainer.prepend(div);
    }

    // --- 3. Three.js 3D Game Engine ---
    let scene, camera, renderer;
    let playerMesh, partnerMesh;
    let obstacles = [];
    let ground;
    let animationId;
    
    // Game Physics
    let speed = 0.4;
    let playerY = 0;
    let playerVelY = 0;
    let isJumping = false;
    let frameCount = 0;
    let gameSeed = 0;

    function initGame() {
        const container = document.getElementById('game-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 10, 50);

        // Camera (Behind player view)
        camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, -5);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground (Infinite Grid effect)
        const gridHelper = new THREE.GridHelper(200, 200, 0x444444, 0x222222);
        scene.add(gridHelper);
        
        // Player (Me)
        const color = myRole === 'mahmoud' ? 0x00d2ff : 0xff4b1f;
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
        playerMesh = new THREE.Mesh(geometry, material);
        playerMesh.position.set(-1.5, 0.5, 0); // Left lane
        playerMesh.castShadow = true;
        scene.add(playerMesh);

        // Partner (Visual Only)
        const partnerColor = myRole === 'mahmoud' ? 0xff4b1f : 0x00d2ff;
        const partnerMat = new THREE.MeshStandardMaterial({ color: partnerColor, emissive: partnerColor, emissiveIntensity: 0.5 });
        partnerMesh = new THREE.Mesh(geometry, partnerMat);
        partnerMesh.position.set(1.5, 0.5, -5); // Right lane (start behind)
        scene.add(partnerMesh);

        // Resize Listener
        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // Start Loop
        animate();
    }

    // Pseudo Random for Synced Obstacles
    function seededRandom(seed) {
        var x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (gameRunning) {
            frameCount++;
            myScore++;
            myScoreValEl.innerText = myScore;
            
            // Ground movement simulation
            // We actually move objects towards camera
            
            // Obstacle Spawning (Synced)
            // We spawn based on score/frames so both see same obstacle pattern
            // Example: Spawn obstacle every 50 units of score
            if (myScore % 40 === 0) {
                createObstacle(myScore);
            }

            // Move Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.mesh.position.z += speed; // Move towards camera
                
                // Collision Detection
                if (Math.abs(obs.mesh.position.z - playerMesh.position.z) < 0.8) {
                    if (isJumping && playerY < 0.5) { // If jump too low
                        crash();
                    } else if (!isJumping) {
                        crash();
                    }
                }

                // Remove if passed camera
                if (obs.mesh.position.z > 10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                }
            }

            // Jump Physics
            if (isJumping) {
                playerVelY -= 0.015; // Gravity
                playerY += playerVelY;
                if (playerY <= 0) {
                    playerY = 0;
                    isJumping = false;
                }
                playerMesh.position.y = 0.5 + playerY;
            }
        }

        // Render
        renderer.render(scene, camera);
    }

    function createObstacle(currentScore) {
        // Use score as seed base to ensure sync
        const seedBase = currentScore;
        const type = seededRandom(seedBase) > 0.5 ? 1 : 0; // 0 = low, 1 = high
        
        const height = type === 0 ? 1 : 2;
        const geometry = new THREE.BoxGeometry(1.5, height, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const mesh = new THREE.Mesh(geometry, material);
        
        mesh.position.set(-1.5, height/2, -50); // Spawn far away in my lane
        scene.add(mesh);
        obstacles.push({ mesh: mesh });
    }

    window.jump = function() {
        if (!isJumping && gameRunning) {
            isJumping = true;
            playerVelY = 0.35; // Jump force
        }
    };

    // Controls
    document.getElementById('jump-btn-large').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    document.getElementById('jump-btn-large').addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });

    // --- 4. Firebase Sync & Game Logic ---

    const gameRef = ref(db, 'race_room');
    const scoresRef = ref(db, 'bank_coins');

    function listenToDB() {
        // Sync Scores
        onValue(scoresRef, (snap) => {
            const data = snap.val() || { mahmoud: 0, nagham: 0 };
            scoreMEl.innerText = data.mahmoud || 0;
            scoreNEl.innerText = data.nagham || 0;
        });

        // Sync Game State
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if (!data) return;

            // Update Partner Visuals
            // We map partner's score to a Z position relative to ours or absolute
            // To keep it simple: Show partner running if data.p_status === 'playing'
            if (data.p_status === 'playing') {
                // Simple visual feedback that partner is running
                partnerMesh.position.x = 1.5;
                // Shake effect or something could be added here
            } else if (data.p_status === 'crashed') {
                partnerMesh.rotation.x = 1.5; // Fall over
                partnerMesh.position.y = 0;
            } else {
                partnerMesh.rotation.x = 0; // Reset
            }

            // Game Flow
            if (data.state === 'waiting') {
                gameRunning = false;
                overlay.style.display = 'flex';
                startBtn.disabled = false;
                startBtn.innerText = "ابدأ السباق!";
                overlayMsg.innerText = data.requester ? `${data.requester} مستعد...` : "في انتظار البداية";
                subMsg.innerText = "أول شخص يوصل 50 ياخد 20 نقطة!";
            } else if (data.state === 'playing') {
                if (!gameRunning && data.status !== 'crashed') {
                    startGame(data.seed);
                }
            } else if (data.state === 'finished') {
                gameRunning = false;
                handleFinish(data);
            }
        });
    }

    window.requestStart = function() {
        const myName = myRole === 'mahmoud' ? 'Mahmoud' : 'Nagham';
        const randomSeed = Math.floor(Math.random() * 10000);
        
        // Reset state
        set(gameRef, {
            state: 'waiting',
            requester: myName,
            seed: randomSeed
        });

        // Auto start after 2 seconds if both are "ready" (simulated by delay here for simplicity)
        setTimeout(() => {
            set(gameRef, { 
                state: 'playing', 
                seed: randomSeed,
                status: 'playing',
                p_status: 'waiting' // Reset partner status
            });
        }, 2000);
    };

    function startGame(seed) {
        gameRunning = true;
        myScore = 0;
        gameSeed = seed;
        frameCount = 0;
        obstacles.forEach(o => scene.remove(o.mesh));
        obstacles = [];
        
        playerMesh.position.y = 0.5;
        playerY = 0;
        isJumping = false;
        partnerMesh.rotation.x = 0;

        overlay.style.display = 'none';

        // Write "I am playing" to DB
        const update = {};
        update[`status`] = 'playing';
        if (myRole === 'mahmoud') update['m_status'] = 'playing';
        else update['n_status'] = 'playing';
        
        set(gameRef, update);
    }

    function crash() {
        if (!gameRunning) return;
        gameRunning = false;
        
        // Visual crash
        playerMesh.rotation.x = 1.5;
        playerMesh.position.y = 0.5;

        // Update DB: I crashed
        const update = {};
        update[`status`] = 'crashed';
        update[`winner`] = (myRole === 'mahmoud') ? 'nagham' : 'mahmoud'; // Partner wins
        
        set(gameRef, update);
    }

    function handleFinish(data) {
        overlay.style.display = 'flex';
        
        // Determine Result
        const amIWinner = data.winner === myRole;
        const opponentName = (myRole === 'mahmoud') ? 'Nagham' : 'Mahmoud';

        if (amIWinner) {
            // Win Modal
            showResultModal(true, `فزت على ${opponentName}!`, `أنت أسرع ووصلت للهدف.`, `+${STAKE_AMOUNT}`);
            addLog(`🏆 ${myRole} فاز السباق وحصل على ${STAKE_AMOUNT} نقطة.`, 'win');
            
            // Transfer Money
            runTransaction(ref(db, `bank_coins/${myRole}`), c => (c||0) + STAKE_AMOUNT);
        } else {
            // Lose Modal
            showResultModal(false, `خسرت أمام ${opponentName}`, `أنت اصطدمت أو تأخرت.`, `-${STAKE_AMOUNT}`);
            addLog(`💥 ${myRole} خسر السباق وتم خصم ${STAKE_AMOUNT} نقطة.`, 'loss');
            
            // Transfer Money (Deduct)
            runTransaction(ref(db, `bank_coins/${myRole}`), c => Math.max(0, (c||0) - STAKE_AMOUNT));
        }
    }

    function showResultModal(win, title, desc, money) {
        const modal = document.getElementById('result-modal');
        const icon = document.getElementById('res-icon');
        const t = document.getElementById('res-title');
        const d = document.getElementById('res-desc');
        const m = document.getElementById('res-money');

        modal.style.display = 'flex';
        icon.innerHTML = win ? '🏆' : '💥';
        t.innerText = title;
        t.className = 'result-title ' + (win ? 'win-text' : 'lose-text');
        d.innerText = desc;
        m.innerText = money;
        m.style.color = win ? '#00b894' : '#ff7675';
    }

    window.closeResult = function() {
        document.getElementById('result-modal').style.display = 'none';
        set(gameRef, { state: 'waiting' }); // Reset to waiting for next round
    };

</script>
</body>
</html>
