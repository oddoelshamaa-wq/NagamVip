<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mahmoud & Nagham - 3D Love & Fines</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
            --mahmoud: #00d2ff;
            --nagham: #ff4b1f;
            --gold: #ffd700;
            --red-punish: #e74c3c;
            --text: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            display: flex; flex-direction: column; gap: 10px;
            padding-bottom: 80px;
        }

        /* --- Anniversary Counter --- */
        #love-counter {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .love-title { font-size: 0.9rem; color: #fab1a0; margin-bottom: 5px; }
        .timer-display { font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; }

        /* --- UI Cards --- */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px; margin: 5px;
            position: relative;
        }

        /* --- Header / Bank --- */
        .bank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .player-score-box { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .avatar-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
        .score-val { font-size: 1.2rem; font-family: sans-serif; }
        
        /* --- Manual Fine Button --- */
        .fine-btn {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            background: var(--red-punish); border: 2px solid #fff; color: #fff;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
        }
        .fine-btn:active { transform: translateX(-50%) scale(0.9); }

        /* --- 3D Game Container --- */
        #game-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        canvas { display: block; width: 100%; height: 100%; outline: none; }

        #game-hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 10px;
            display: flex; justify-content: space-between; pointer-events: none;
            text-shadow: 0 2px 4px #000; font-weight: bold;
        }
        .hud-target { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; border: 1px solid #fff; }

        #game-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; text-align: center;
        }
        
        .btn-3d {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            border: none; padding: 12px 30px; border-radius: 30px; color: #fff;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.1s; width: 80%;
        }
        .btn-3d:active { transform: scale(0.95); }

        #controls-area {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        #jump-btn-large {
            pointer-events: all;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2); border: 2px solid #fff;
            backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- Logs Section (Punishment Record) --- */
        #log-container {
            height: 140px; overflow-y: auto; font-size: 0.85rem;
            display: flex; flex-direction: column; gap: 5px; padding: 5px;
        }
        .log-header { font-size: 0.9rem; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 5px; display: flex; justify-content: space-between;}
        .log-item {
            background: rgba(255,255,255,0.05); padding: 8px 10px; border-radius: 8px;
            border-right: 3px solid #555; display: flex; justify-content: space-between;
        }
        .log-win { border-color: var(--gold); color: #fff; background: rgba(255, 215, 0, 0.1); }
        .log-loss { border-color: var(--nagham); color: #ffcccc; background: rgba(255, 75, 31, 0.1); }
        .log-fine { border-color: var(--red-punish); background: rgba(231, 76, 60, 0.15); color: #ffebee; }

        /* Modals */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 6000;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #222; border: 1px solid #444; padding: 25px; border-radius: 20px;
            width: 85%; text-align: center; color: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #555; background: #333; color: #fff; margin-top: 5px; }
        .modal-btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-cancel { background: #555; color: #fff; }
        .btn-confirm { background: var(--red-punish); color: #fff; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>

<!-- Anniversary Counter -->
<div id="love-counter">
    <div class="love-title">❤️ ده يوم حبنا (من 20/11/2024)</div>
    <div class="timer-display" id="timer">Loading...</div>
</div>

<!-- Bank Section with Fine Button -->
<div class="card">
    <button class="fine-btn" onclick="openFineModal()" title="غرامة / محكمة">⚖️</button>
    
    <div class="bank-header">
        <div class="player-score-box">
            <div class="avatar-dot" style="background:var(--mahmoud)"></div>
            <span style="color:#ccc">Mahmoud</span>
            <span class="score-val" id="score-m">0</span>
        </div>
        <div style="font-size:0.8rem; color:#888; text-align:center;">الرصيد الحالي</div>
        <div class="player-score-box">
            <span class="score-val" id="score-n">0</span>
            <span style="color:#ccc">Nagham</span>
            <div class="avatar-dot" style="background:var(--nagham)"></div>
        </div>
    </div>
</div>

<!-- 3D Game Area -->
<div id="game-container">
    <div id="game-hud">
        <div>هدف الفوز: <span id="target-val">50</span></div>
        <div>مستواي: <span id="my-score-val" style="color:var(--gold)">0</span></div>
    </div>
    
    <div id="game-overlay">
        <h2 id="overlay-msg" style="color:#fff; margin-bottom:20px;">انتظار الشريك...</h2>
        <p id="sub-msg" style="color:#aaa; font-size:0.9rem; margin-bottom:20px;">أول شخص يوصل 50 ياخد 20 نقطة</p>
        <button id="start-btn" class="btn-3d" onclick="requestStart()" disabled>جاري التجهيز...</button>
    </div>
</div>

<!-- Punishment Log Section -->
<div class="card" id="log-container">
    <div class="log-header">
        <span><i class="fas fa-gavel"></i> سجل العقوبات والغرامات</span>
        <span style="font-size:0.7rem; color:#666;">Live</span>
    </div>
    <!-- Logs injected here -->
</div>

<!-- Controls -->
<div id="controls-area">
    <div id="jump-btn-large"><i class="fas fa-plane"></i></div>
</div>

<!-- Result Modal -->
<div id="result-modal" class="modal">
    <div class="modal-content">
        <div id="res-icon" style="font-size:3rem; margin-bottom:10px;"></div>
        <div id="res-title" class="result-title"></div>
        <div id="res-desc" style="color:#bbb; margin-bottom:10px;"></div>
        <div id="res-money" style="font-size:2rem; margin:10px 0; font-weight:bold;"></div>
        <button class="modal-btn btn-confirm" style="width:100%" onclick="closeResult()">تم</button>
    </div>
</div>

<!-- Manual Fine Modal -->
<div id="fine-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px; color:var(--red-punish)">⚖️ تطبيق غرامة</h3>
        
        <div class="form-group">
            <label>مين اللي هيدفع؟</label>
            <select id="fine-target" class="form-input">
                <option value="partner">الشريك (عقاب)</option>
                <option value="me">أنا (اعتذار)</option>
            </select>
        </div>

        <div class="form-group">
            <label>المبلغ (نقاط)</label>
            <input type="number" id="fine-amount" class="form-input" value="10">
        </div>

        <div class="form-group">
            <label>السبب</label>
            <input type="text" id="fine-reason" class="form-input" placeholder="مثلاً: إزعاج...">
        </div>

        <div style="display:flex; justify-content:center;">
            <button class="modal-btn btn-cancel" onclick="closeFineModal()">إلغاء</button>
            <button class="modal-btn btn-confirm" onclick="submitFine()">تنفيذ الغرامة</button>
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, runTransaction, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhQDPwYPwPPWUnFaeVga9iGejDNkLgXH0",
        authDomain: "nagam-12f98.firebaseapp.com",
        projectId: "nagam-12f98",
        storageBucket: "nagam-12f98.firebasestorage.app",
        messagingSenderId: "489197943984",
        appId: "1:489197943984:web:2b1823691e8e525b288f75",
        measurementId: "G-LB7V0QWTYP"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Globals
    let myRole = localStorage.getItem('role');
    let gameRunning = false;
    let myScore = 0;
    const WIN_SCORE = 50; 
    const STAKE_AMOUNT = 20; 

    // --- 1. Timer Logic ---
    const START_DATE = new Date('2024-11-20T00:00:00');
    function updateTimer() {
        const now = new Date();
        const diff = now - START_DATE;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('timer').innerHTML = `${days} يوم  |  ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }
    setInterval(updateTimer, 1000); updateTimer();

    // --- 2. Three.js 3D Game ---
    let scene, camera, renderer, playerMesh, partnerMesh;
    let obstacles = [], frameCount = 0, speed = 0.4;
    let playerY = 0, playerVelY = 0, isJumping = false;

    function initGame() {
        const container = document.getElementById('game-container');
        const width = container.clientWidth; const height = container.clientHeight;

        scene = new THREE.Scene(); scene.background = new THREE.Color(0x111111); scene.fog = new THREE.Fog(0x111111, 10, 50);
        camera = new THREE.PerspectiveCamera(60, width/height, 0.1, 100);
        camera.position.set(0, 3, 6); camera.lookAt(0, 0, -5);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height); renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5); dirLight.castShadow = true; scene.add(dirLight);

        // Ground
        scene.add(new THREE.GridHelper(200, 200, 0x444444, 0x222222));

        // Player
        const pColor = myRole === 'mahmoud' ? 0x00d2ff : 0xff4b1f;
        const pGeo = new THREE.BoxGeometry(1, 1, 1);
        const pMat = new THREE.MeshStandardMaterial({ color: pColor, emissive: pColor, emissiveIntensity: 0.5 });
        playerMesh = new THREE.Mesh(pGeo, pMat);
        playerMesh.position.set(-1.5, 0.5, 0); playerMesh.castShadow = true; scene.add(playerMesh);

        // Partner
        const nColor = myRole === 'mahmoud' ? 0xff4b1f : 0x00d2ff;
        const nMat = new THREE.MeshStandardMaterial({ color: nColor, emissive: nColor, emissiveIntensity: 0.5 });
        partnerMesh = new THREE.Mesh(pGeo, nMat);
        partnerMesh.position.set(1.5, 0.5, -5); scene.add(partnerMesh);

        window.addEventListener('resize', () => {
            camera.aspect = width/height; camera.updateProjectionMatrix(); renderer.setSize(width, height);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (gameRunning) {
            frameCount++; myScore++;
            document.getElementById('my-score-val').innerText = myScore;

            if (myScore % 40 === 0) createObstacle(myScore); // Synced spawn

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.mesh.position.z += speed;

                // Collision
                if (Math.abs(obs.mesh.position.z - playerMesh.position.z) < 0.8) {
                    if ((isJumping && playerY < 0.5) || !isJumping) crash();
                }
                if (obs.mesh.position.z > 10) { scene.remove(obs.mesh); obstacles.splice(i, 1); }
            }

            // Physics
            if (isJumping) {
                playerVelY -= 0.015; playerY += playerVelY;
                if (playerY <= 0) { playerY = 0; isJumping = false; }
                playerMesh.position.y = 0.5 + playerY;
            }
        }
        renderer.render(scene, camera);
    }

    function createObstacle(seed) {
        const h = (Math.sin(seed * 12.9898) * 43758.5453 % 1 > 0.5) ? 1 : 2;
        const geo = new THREE.BoxGeometry(1.5, h, 1);
        const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        mesh.position.set(-1.5, h/2, -50); scene.add(mesh); obstacles.push({mesh});
    }

    window.jump = function() {
        if (!isJumping && gameRunning) { isJumping = true; playerVelY = 0.35; }
    };

    document.getElementById('jump-btn-large').addEventListener('touchstart', e => { e.preventDefault(); jump(); });
    window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });

    // --- 3. Firebase & Logic ---
    const gameRef = ref(db, 'race_room');
    const logsRef = ref(db, 'punishment_logs');

    if(myRole) {
        document.getElementById('select-screen')?.remove(); // Safety
        initGame();
        listenToDB();
    }

    // Logs Helper
    function addLog(text, type) {
        push(logsRef, { text: text, type: type, role: myRole, time: Date.now() });
    }

    function listenToDB() {
        // Scores
        onValue(ref(db, 'bank_coins'), snap => {
            const d = snap.val() || {mahmoud:0, nagham:0};
            document.getElementById('score-m').innerText = d.mahmoud || 0;
            document.getElementById('score-n').innerText = d.nagham || 0;
        });

        // Logs UI
        onValue(logsRef, snap => {
            const logs = snap.val(); const container = document.getElementById('log-container');
            container.innerHTML = '<div class="log-header"><span><i class="fas fa-gavel"></i> سجل العقوبات والغرامات</span><span style="font-size:0.7rem;color:#666;">Live</span></div>';
            if(!logs) return;
            Object.values(logs).reverse().slice(0, 15).forEach(l => {
                const div = document.createElement('div');
                div.className = `log-item log-${l.type}`;
                div.innerHTML = `<span>${l.text}</span> <span style="font-size:0.7rem;opacity:0.7">${new Date(l.time).getHours()}:${String(new Date(l.time).getMinutes()).padStart(2,'0')}</span>`;
                container.appendChild(div);
            });
        });

        // Game State
        onValue(gameRef, snap => {
            const d = snap.val(); if(!d) return;
            
            if (d.state === 'waiting') {
                gameRunning = false; overlay.style.display = 'flex';
                startBtn.disabled = false; startBtn.innerText = "ابدأ السباق!";
                overlayMsg.innerText = d.requester ? `${d.requester} مستعد...` : "في انتظار البداية";
            } else if (d.state === 'playing') {
                if (!gameRunning && d.status !== 'crashed') startGame(d.seed);
            } else if (d.state === 'finished') {
                gameRunning = false; handleFinish(d);
            }
        });
    }

    window.requestStart = function() {
        const myName = myRole === 'mahmoud' ? 'Mahmoud' : 'Nagham';
        set(gameRef, { state: 'waiting', requester: myName, seed: Math.floor(Math.random()*10000) });
        setTimeout(() => set(gameRef, { state: 'playing', seed: Math.floor(Math.random()*10000), status: 'playing' }), 2000);
    };

    function startGame() {
        gameRunning = true; myScore = 0; obstacles.forEach(o => scene.remove(o.mesh)); obstacles = [];
        playerMesh.position.y = 0.5; playerY = 0; isJumping = false; partnerMesh.rotation.x = 0;
        overlay.style.display = 'none';
    }

    function crash() {
        if(!gameRunning) return; gameRunning = false;
        playerMesh.rotation.x = 1.5; playerMesh.position.y = 0.5;
        set(gameRef, { status: 'crashed', winner: (myRole === 'mahmoud') ? 'nagham' : 'mahmoud', state: 'finished' });
    }

    function handleFinish(data) {
        const amIWinner = data.winner === myRole;
        const opponentName = (myRole === 'mahmoud') ? 'Nagham' : 'Mahmoud';
        
        if (amIWinner) {
            // Win
            addPoints(myRole, STAKE_AMOUNT);
            addLog(`🏆 <b>${myRole}</b> فاز السباق على ${opponentName} وحصل على ${STAKE_AMOUNT} نقطة.`, 'win');
            showResultModal(true, "مبروك الفوز!", `أنت وصلت للهدف أولاً.`, `+${STAKE_AMOUNT}`);
        } else {
            // Lose (Punishment)
            addPoints(myRole, -STAKE_AMOUNT);
            addLog(`💥 <b>${myRole}</b> خسر السباق وتتم عليه غرامة ${STAKE_AMOUNT} نقطة.`, 'fine');
            showResultModal(false, "لقد خسرت!", `${opponentName} وصل أولاً.`, `-${STAKE_AMOUNT}`);
        }
    }

    function addPoints(role, amount) {
        runTransaction(ref(db, `bank_coins/${role}`), c => (c||0) + amount);
    }

    function showResultModal(win, title, desc, money) {
        const modal = document.getElementById('result-modal');
        document.getElementById('res-icon').innerText = win ? '🏆' : '💸';
        const t = document.getElementById('res-title'); t.innerText = title; t.style.color = win ? 'var(--gold)' : 'var(--red-punish)';
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('res-money').innerText = money; document.getElementById('res-money').style.color = win ? '#00b894' : '#e74c3c';
        modal.style.display = 'flex';
    }

    window.closeResult = function() {
        document.getElementById('result-modal').style.display = 'none';
        set(gameRef, { state: 'waiting' });
    };

    // --- 4. Manual Fine Logic ---
    window.openFineModal = () => document.getElementById('fine-modal').style.display = 'flex';
    window.closeFineModal = () => document.getElementById('fine-modal').style.display = 'none';

    window.submitFine = function() {
        const target = document.getElementById('fine-target').value;
        const amount = parseInt(document.getElementById('fine-amount').value) || 0;
        const reason = document.getElementById('fine-reason').value || "بدون سبب";

        if(amount <= 0) return alert('اكتب مبلغ صحيح!');

        let victimRole = target === 'me' ? myRole : (myRole === 'mahmoud' ? 'nagham' : 'mahmoud');
        let victimName = victimRole === 'mahmoud' ? 'Mahmoud' : 'Nagham';

        // Deduct
        runTransaction(ref(db, `bank_coins/${victimRole}`), c => Math.max(0, (c||0) - amount));

        // Log as FINE
        addLog(`⚖️ <b>${victimName}</b> غرامة: -${amount} نقطة. (${reason})`, 'fine');

        closeFineModal();
    };
</script>
</body>
</html>
