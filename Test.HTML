<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلم الصينية الذكي - AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080810;
            --bg2: #0e0e1a;
            --card: #151524;
            --card2: #1c1c30;
            --accent: #e63946;
            --accent-glow: rgba(230,57,70,0.25);
            --accent2: #f4a261;
            --gold: #e9c46a;
            --green: #2a9d8f;
            --cyan: #00b4d8;
            --fg: #f0f0f5;
            --fg2: #9999b0;
            --muted: #55556a;
            --border: #252540;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }

        .bg-effects {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            animation: orbFloat 18s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) {
            width: 500px; height: 500px; top: -15%; right: -10%;
            background: radial-gradient(circle, rgba(230,57,70,0.1), transparent 70%);
        }
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px; bottom: -10%; left: -5%;
            background: radial-gradient(circle, rgba(42,157,143,0.08), transparent 70%);
            animation-delay: -6s; animation-duration: 22s;
        }
        .bg-orb:nth-child(3) {
            width: 300px; height: 300px; top: 40%; left: 40%;
            background: radial-gradient(circle, rgba(233,196,106,0.05), transparent 70%);
            animation-delay: -12s; animation-duration: 25s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.15); }
            66% { transform: translate(-25px, 25px) scale(0.9); }
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .floating-chars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .float-char {
            position: absolute; font-family: 'Noto Sans SC', sans-serif;
            color: rgba(230,57,70,0.035); font-weight: 900;
            animation: charRise linear infinite;
        }
        @keyframes charRise {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            8% { opacity: 1; }
            92% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(15deg); opacity: 0; }
        }

        .app {
            position: relative; z-index: 1;
            display: flex; height: 100vh; max-width: 1500px; margin: 0 auto;
        }

        .sidebar {
            width: 300px; background: var(--bg2);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        .sidebar-head {
            padding: 28px 20px 20px; text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo-box {
            width: 72px; height: 72px; margin: 0 auto 14px;
            background: linear-gradient(135deg, var(--accent), #b71c1c);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Sans SC', sans-serif; font-size: 38px; font-weight: 900; color: #fff;
            box-shadow: 0 10px 40px var(--accent-glow);
            position: relative; overflow: hidden;
        }
        .logo-box::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
            animation: logoShine 4s ease-in-out infinite;
        }
        @keyframes logoShine {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .logo-title { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
        .logo-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

        .cats { padding: 12px 10px; flex: 1; overflow-y: auto; }
        .cats::-webkit-scrollbar { width: 3px; }
        .cats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .cat-label {
            font-size: 10px; color: var(--muted); text-transform: uppercase;
            letter-spacing: 1.5px; padding: 10px 14px 6px; font-weight: 700;
        }

        .cat-btn {
            display: flex; align-items: center; gap: 11px; width: 100%;
            padding: 11px 13px; border: none; background: transparent;
            color: var(--fg2); font-family: 'Cairo', sans-serif; font-size: 13px;
            border-radius: 11px; cursor: pointer; transition: all 0.2s; margin-bottom: 3px;
            text-align: right;
        }
        .cat-btn:hover { background: var(--card); color: var(--fg); }
        .cat-btn.active {
            background: linear-gradient(135deg, rgba(230,57,70,0.12), rgba(230,57,70,0.04));
            color: var(--accent); font-weight: 700;
        }
        .cat-btn i {
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            background: var(--card); border-radius: 8px; font-size: 12px; flex-shrink: 0;
            transition: all 0.2s;
        }
        .cat-btn.active i { background: var(--accent); color: #fff; }

        .cat-count {
            margin-right: auto; font-size: 10px; background: var(--card);
            padding: 2px 7px; border-radius: 6px; color: var(--muted);
        }
        .cat-btn.active .cat-count { background: rgba(230,57,70,0.2); color: var(--accent); }

        /* === إعدادات API === */
        .api-section {
            padding: 10px 14px; border-top: 1px solid var(--border);
        }
        .api-toggle {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-size: 11px; color: var(--fg2); margin-bottom: 8px;
        }
        .api-toggle .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); transition: all 0.3s;
        }
        .api-toggle .dot.on { background: var(--green); box-shadow: 0 0 8px rgba(42,157,143,0.5); }
        .api-input-wrap {
            display: none; gap: 6px;
        }
        .api-input-wrap.show { display: flex; }
        .api-input {
            flex: 1; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 10px; color: var(--fg);
            font-family: 'Cairo', sans-serif; font-size: 11px; outline: none;
        }
        .api-input:focus { border-color: var(--accent); }
        .api-input::placeholder { color: var(--muted); font-size: 10px; }
        .api-save {
            background: var(--accent); border: none; color: #fff;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 11px; font-family: 'Cairo', sans-serif; font-weight: 700;
            transition: all 0.2s;
        }
        .api-save:hover { transform: scale(1.05); }
        .api-status {
            font-size: 10px; color: var(--muted); margin-top: 6px;
            display: flex; align-items: center; gap: 5px;
        }
        .api-status i { font-size: 9px; }
        .api-status.ok { color: var(--green); }
        .api-status.err { color: var(--accent); }

        .stats {
            padding: 14px 16px; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .stat {
            text-align: center; padding: 10px 4px;
            background: var(--card); border-radius: 10px;
        }
        .stat-n { font-size: 18px; font-weight: 900; color: var(--gold); }
        .stat-l { font-size: 9px; color: var(--muted); margin-top: 2px; }

        .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .chat-head {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(14,14,26,0.85); backdrop-filter: blur(24px);
            position: relative;
        }
        .chat-head h2 { font-size: 15px; font-weight: 700; }
        .chat-head .online {
            font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px;
        }
        .chat-head .online.offline { color: var(--accent); }
        .chat-head .online::before {
            content: ''; width: 6px; height: 6px; background: var(--green);
            border-radius: 50%; animation: pulse 2s ease-in-out infinite;
        }
        .chat-head .online.offline::before { background: var(--accent); animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(42,157,143,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(42,157,143,0); }
        }

        .head-actions { display: flex; gap: 6px; }
        .h-btn {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: var(--card); color: var(--fg2); border-radius: 9px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 13px; transition: all 0.2s;
        }
        .h-btn:hover { border-color: var(--accent); color: var(--accent); }

        .progress-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--border);
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 3px; transition: width 0.5s ease; width: 0%;
        }

        .msgs {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        .msgs::-webkit-scrollbar { width: 4px; }
        .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg {
            display: flex; gap: 10px; max-width: 82%;
            animation: msgSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-av {
            width: 38px; height: 38px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; margin-top: 2px;
        }
        .msg.bot .msg-av { background: linear-gradient(135deg, var(--accent), #b71c1c); color: #fff; }
        .msg.user .msg-av { background: var(--card2); color: var(--fg2); }

        .msg-body {
            padding: 13px 16px; border-radius: 15px; line-height: 1.85; font-size: 13.5px;
        }
        .msg.bot .msg-body {
            background: var(--card); border: 1px solid var(--border); border-top-right-radius: 4px;
        }
        .msg.user .msg-body {
            background: linear-gradient(135deg, rgba(230,57,70,0.1), rgba(230,57,70,0.05));
            border: 1px solid rgba(230,57,70,0.15); border-top-left-radius: 4px;
        }

        .msg-body .zh {
            font-family: 'Noto Sans SC', sans-serif; font-size: 28px; font-weight: 900;
            color: var(--fg); display: block; margin-bottom: 4px; line-height: 1.3;
        }
        .msg-body .py { font-size: 14px; color: var(--accent2); font-style: italic; display: block; }
        .msg-body .mn { color: var(--fg2); font-size: 13px; }
        .msg-body .hl { color: var(--gold); font-weight: 700; }
        .msg-body .note-box {
            margin-top: 10px; padding: 10px 14px; background: rgba(233,196,106,0.06);
            border: 1px solid rgba(233,196,106,0.12); border-radius: 10px;
            font-size: 12px; color: var(--fg2); display: flex; gap: 8px; align-items: flex-start;
        }
        .msg-body .note-box i { color: var(--gold); margin-top: 2px; flex-shrink: 0; }

        /* === تنسيق ردود AI === */
        .msg-body .ai-zh {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 22px; font-weight: 700;
            color: var(--fg); display: inline; cursor: pointer;
            padding: 2px 4px; border-radius: 4px;
            transition: background 0.2s;
        }
        .msg-body .ai-zh:hover {
            background: rgba(230,57,70,0.15);
        }
        .msg-body .ai-py {
            color: var(--accent2); font-style: italic; font-size: 13px;
        }
        .msg-body .ai-section {
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .msg-body .ai-label {
            font-size: 11px; color: var(--muted); font-weight: 700;
            margin-bottom: 6px; display: flex; align-items: center; gap: 5px;
        }
        .msg-body .ai-examples {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .msg-body .ai-ex {
            padding: 6px 12px; background: var(--card2);
            border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: all 0.2s; font-size: 12px;
        }
        .msg-body .ai-ex:hover {
            border-color: var(--accent); background: rgba(230,57,70,0.06);
        }
        .msg-body .ai-ex .ai-zh { font-size: 16px; }

        .wcard {
            background: var(--card2); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px; margin-top: 10px; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .wcard::before {
            content: ''; position: absolute; top: 0; right: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--accent), var(--accent2));
        }
        .wcard:hover {
            border-color: rgba(230,57,70,0.3); transform: translateX(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }
        .wcard.playing {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .wcard-top { display: flex; align-items: center; justify-content: space-between; }
        .wcard-char {
            font-family: 'Noto Sans SC', sans-serif; font-size: 42px; font-weight: 900; color: var(--fg);
            transition: transform 0.2s;
        }
        .wcard.playing .wcard-char { transform: scale(1.08); }
        .wcard-speak {
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--border);
            background: transparent; color: var(--accent); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            transition: all 0.25s; position: relative;
        }
        .wcard-speak:hover {
            background: var(--accent); color: #fff; border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .wcard-speak.speaking::after {
            content: ''; position: absolute; inset: -6px;
            border: 2px solid var(--accent); border-radius: 50%;
            animation: speakRing 1s ease-out infinite;
        }
        @keyframes speakRing {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .wcard-py { font-size: 15px; color: var(--accent2); margin-top: 6px; font-weight: 600; }
        .wcard-mn { font-size: 14px; color: var(--fg2); margin-top: 2px; }
        .wcard-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted);
        }
        .wcard-nav button {
            background: var(--card); border: 1px solid var(--border); color: var(--fg2);
            padding: 5px 12px; border-radius: 7px; font-family: 'Cairo', sans-serif;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .wcard-nav button:hover { border-color: var(--accent); color: var(--accent); }

        .quiz-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
        .q-opt {
            padding: 11px 14px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: var(--fg); font-family: 'Cairo', sans-serif;
            font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: right;
            display: flex; align-items: center; gap: 10px;
        }
        .q-opt:hover { border-color: var(--gold); background: rgba(233,196,106,0.04); }
        .q-opt.correct { border-color: var(--green); background: rgba(42,157,143,0.12); color: var(--green); }
        .q-opt.wrong { border-color: var(--accent); background: rgba(230,57,70,0.08); color: var(--accent); }
        .q-opt.locked { pointer-events: none; }
        .q-num {
            width: 24px; height: 24px; border-radius: 6px; background: var(--card2);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; flex-shrink: 0;
        }
        .q-opt.correct .q-num { background: var(--green); color: #fff; }
        .q-opt.wrong .q-num { background: var(--accent); color: #fff; }

        .typing { display: flex; gap: 5px; padding: 6px 2px; }
        .typing span {
            width: 7px; height: 7px; background: var(--green); border-radius: 50%;
            animation: tdot 1.2s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes tdot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        .input-area {
            padding: 14px 24px 20px; border-top: 1px solid var(--border);
            background: rgba(14,14,26,0.9); backdrop-filter: blur(24px);
        }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .inp {
            flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 13px;
            padding: 13px 16px; color: var(--fg); font-family: 'Cairo', sans-serif; font-size: 14px;
            resize: none; outline: none; min-height: 46px; max-height: 110px;
            transition: border-color 0.2s; line-height: 1.6;
        }
        .inp::placeholder { color: var(--muted); }
        .inp:focus { border-color: var(--accent); }
        .inp:disabled { opacity: 0.5; cursor: not-allowed; }

        .send {
            width: 46px; height: 46px; border-radius: 13px; border: none;
            background: linear-gradient(135deg, var(--accent), #b71c1c); color: #fff;
            font-size: 17px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; flex-shrink: 0;
        }
        .send:hover { transform: scale(1.06); box-shadow: 0 4px 24px var(--accent-glow); }
        .send:active { transform: scale(0.94); }
        .send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .quick-row { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
        .qb {
            padding: 5px 13px; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; color: var(--fg2); font-family: 'Cairo', sans-serif;
            font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .qb:hover { border-color: var(--accent); color: var(--accent); }
        .qb:disabled { opacity: 0.3; cursor: not-allowed; }

        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card2); border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 11px; color: var(--fg); font-size: 13px;
            z-index: 999; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--green); }

        .speak-float {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0);
            background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 30px;
            font-size: 13px; font-weight: 700; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 30px var(--accent-glow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .speak-float.show { transform: translateX(-50%) scale(1); }

        /* === شريط تحميل AI === */
        .ai-loading-bar {
            height: 2px; background: var(--border); border-radius: 2px;
            margin-top: 8px; overflow: hidden; display: none;
        }
        .ai-loading-bar.active { display: block; }
        .ai-loading-bar::after {
            content: ''; display: block; height: 100%;
            width: 40%; background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 2px;
            animation: aiLoad 1.2s ease-in-out infinite;
        }
        @keyframes aiLoad {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .ai-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: linear-gradient(135deg, rgba(42,157,143,0.15), rgba(42,157,143,0.05));
            border: 1px solid rgba(42,157,143,0.2);
            padding: 2px 8px; border-radius: 6px;
            font-size: 10px; color: var(--green); font-weight: 700;
            margin-bottom: 8px;
        }
        .ai-badge i { font-size: 8px; }

        @media (max-width: 860px) {
            .sidebar { display: none; }
            .msgs { padding: 14px; }
            .input-area { padding: 10px 14px 14px; }
            .msg { max-width: 95%; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="bg-effects">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>
<div class="floating-chars" id="floatC"></div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>

function toggleApiPanel() {

function saveApiKey() {
    const key = document.getElementById('apiInp').value.trim();
    if (!key) {
        showToast('أدخل مفتاح API أولاً');
        return;
    }
    apiKey = key;
    localStorage.setItem('gemini_api_key', key);
    // اختبار الاتصال
    testApiConnection();
}

async function testApiConnection() {
    const statusEl = document.getElementById('apiStatus');
    const dotEl = document.getElementById('apiDot');
    const onlineEl = document.getElementById('onlineStatus');

    statusEl.className = 'api-status';
    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>جاري اختبار الاتصال...</span>';

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: 'رد بكلمة واحدة: نعم' }] }]
            })
        });

        if (res.ok) {
            apiConnected = true;
            dotEl.classList.add('on');
            statusEl.className = 'api-status ok';
            statusEl.innerHTML = '<i class="fas fa-check-circle"></i><span>متصل بـ Gemini AI</span>';
            onlineEl.className = 'online';
            onlineEl.textContent = 'AI متصل';
            showToast('تم الربط بـ Gemini AI بنجاح!');
        } else {
            throw new Error('API Error');
        }
    } catch (e) {
        apiConnected = false;
        dotEl.classList.remove('on');
        statusEl.className = 'api-status err';
        statusEl.innerHTML = '<i class="fas fa-times-circle"></i><span>فشل الاتصال - تحقق من المفتاح</span>';
        onlineEl.className = 'online offline';
        onlineEl.textContent = 'وضع محلي';
        showToast('فشل الاتصال - تأكد من صحة المفتاح');
    }
}

const SYSTEM_PROMPT = `أنت معلم صيني ذكي اسمك "语老师" تتحدث العربية بطلاقة. قواعدك:

1. أي نص صيني يرسله المستخدم → انطقه له (اكتبه بالصيني مع البينيين)
2. أي طلب ترجمة عربي→صيني → ترجم بدقة مع البينيين
3. أي سؤال عن قواعد الصينية → اشرح ببساطة بالعربي مع أمثلة
4. أي سؤال عام عن الصين/ثقافتها → أجب باختصار مفيد
5. كن ودوداً ومشجعاً، استخدم تعبيرات صينية قصيرة أحياناً

**تنسيق الرد المطلوب (مهم جداً):**
- النصوص الصينية ضعها داخل: 【中文】
- البينيين ضعه داخل: 〔pinyin〕  
- الأمثلة الصينية ضعها داخل: 【中文】 مع البينيين 〔pinyin〕 بعدها
- لا تستخدم أي تنسيق Markdown آخر (لا # أو ** أو -)
- اكتب جمل قصيرة وواضحة
- إذا سأل عن كلمة، أعطها بالصيني ثم البينيين ثم المعنى العربي ثم مثال جملة

مثال لرد صحيح:
الكلمة التي سألت عنها هي 【你好】〔nǐ hǎo〕 وتعني مرحباً. تستخدمها في أي وقت.
مثال في جملة: 【你好吗？】〔nǐ hǎo ma?〕 = كيف حالك؟`;

async function callGemini(userText) {
    // إضافة للمحادثة
    conversationHistory.push({ role: 'user', parts: [{ text: userText }] });

    // الاحتفاظ بآخر 20 رسالة فقط
    if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
    }

    const body = {
        contents: [
            { role: 'user', parts: [{ text: SYSTEM_PROMPT }] },
            { role: 'model', parts: [{ text: 'فهمت! أنا 语老师 معلم الصينية الذكي. سأستخدم التنسيق المطلوب دائماً. 【你好】〔nǐ hǎo〕 مرحباً بك!' }] },
            ...conversationHistory
        ],
        generationConfig: {
            temperature: 0.7,
            topP: 0.9,
            maxOutputTokens: 800
        }
    };

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });

    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || 'فشل الاتصال بالـ AI');
    }

    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!text) throw new Error('لم يُرجع AI أي رد');

    // حفظ رد الـ AI في التاريخ
    conversationHistory.push({ role: 'model', parts: [{ text }] });

    return text;
}

// ============================
// تنسيق رد AI (تحويل العلامات إلى HTML)
// ============================
function formatAIResponse(text) {
    let html = '';

    // تقسيم النص إلى أجزاء ومعالجتها
    const parts = text.split(/(【[^】]+】|〔[^〕]+〕)/g);

    for (let i = 0; i < parts.length; i++) {
        const part = parts[i];

        // الصيني 【中文】
        if (/^【.+】$/.test(part)) {
            const zhText = part.slice(1, -1);
            html += `<span class="ai-zh" onclick="speak('${zhText}')" title="اضغط للنطق">${zhText}</span>`;
        }
        // البينيين 〔pinyin〕
        else if (/^〔.+〕$/.test(part)) {
            const pyText = part.slice(1, -1);
            html += ` <span class="ai-py">${pyText}</span> `;
        }
        // نص عادي
        else {
            // تنظيف النص من أي markdown متبقي
            let clean = part
                .replace(/\*\*/g, '')
                .replace(/^#+\s*/gm, '')
                .replace(/^-\s*/gm, '• ')
                .replace(/\n/g, '<br>');
            html += clean;
        }
    }

    return html;
}

// ============================
// النطق
// ============================
function speak(text, showFloat = true) {
    if (!text || !text.trim()) return;
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.trim());
        u.lang = 'zh-CN';
        u.rate = 0.75;
        u.pitch = 1;
        u.onstart = () => {
            spoken++;
            updateStats();
            const card = document.querySelector('.wcard');
            if (card) card.classList.add('playing');
            const btn = document.querySelector('.wcard-speak');
            if (btn) btn.classList.add('speaking');
            if (showFloat) showSpeakFloat(text);
        };
        u.onend = () => {
            const card = document.querySelector('.wcard');
            if (card) card.classList.remove('playing');
            const btn = document.querySelector('.wcard-speak');
            if (btn) btn.classList.remove('speaking');
            hideSpeakFloat();
        };
        u.onerror = () => {
            const card = document.querySelector('.wcard');
            if (card) card.classList.remove('playing');
            hideSpeakFloat();
        };
        lastSpokenText = text.trim();
        window.speechSynthesis.speak(u);
    }
}

function showSpeakFloat(text) {
    const el = document.getElementById('speakFloat');
    document.getElementById('speakFloatTxt').textContent = text.length > 10 ? text.substring(0, 10) + '...' : text;
    el.classList.add('show');
}
function hideSpeakFloat() {
    document.getElementById('speakFloat').classList.remove('show');
}

function repeatLast() {
    if (lastSpokenText) {
        speak(lastSpokenText);
        showToast('أعد النطق: ' + lastSpokenText);
    } else {
        showToast('لا يوجد نص لنطقه بعد');
    }
}

function showWord(idx) {
    const cat = DB[curCat];
    if (!cat) return;
    idx = Math.max(0, Math.min(idx, cat.words.length - 1));
    curIdx = idx;
    const w = cat.words[idx];
    lastWord = w;
    quizDone = false;
    learned.add(w.zh);
    updateStats();
    updateProg();

    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`تعلّم كلمة من <span class="hl">${cat.title}</span>:${wcardHTML(w, idx, cat.words.length)}`);
        speak(w.zh);
    }, 500);

// ============================
function startQuiz() {
    quizDone = false;
    const cat = DB[curCat];
    const words = cat.words;
    const cw = words[Math.floor(Math.random() * words.length)];
    lastWord = cw;

    let opts = [cw];
    const rest = words.filter(w => w.zh !== cw.zh);
    while (opts.length < 4 && rest.length > 0) {
        const ri = Math.floor(Math.random() * rest.length);
        opts.push(rest.splice(ri, 1)[0]);
    }
    opts.sort(() => Math.random() - 0.5);

    const optsH = opts.map((o, i) => `
        <button class="q-opt" data-zh="${o.zh}" onclick="checkQuiz(this,'${o.zh}','${cw.zh}')">
            <span class="q-num">${'أبجـ'[i]}</span>
            <span>${o.ar}</span>
        </button>
    `).join('');

    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`
            <div style="margin-bottom:6px;">ما معنى هذه الكلمة؟</div>
            <span class="zh" style="font-size:32px;">${cw.zh}</span>
            <span class="py">${cw.py}</span>
            <div class="quiz-opts">${optsH}</div>
        `);
    }, 700);
}

function checkQuiz(btn, sel, cor) {
    if (quizDone) return;
    quizDone = true;
    document.querySelectorAll('.q-opt').forEach(b => {
        b.classList.add('locked');
        if (b.dataset.zh === cor) b.classList.add('correct');
    });

    if (sel === cor) {
        btn.classList.add('correct');
        correctCount++;
        learned.add(cor);
        speak(cor);
        updateStats();
        setTimeout(() => {
            addBot(`<i class="fas fa-check-circle" style="color:var(--green);margin-left:6px;"></i> <span class="hl">إجابة صحيحة!</span> أحسنت، استمر في التعلّم!`);
        }, 300);
    } else {
        btn.classList.add('wrong');
        const cw = DB[curCat].words.find(w => w.zh === cor);
        speak(cor);
        setTimeout(() => {
            addBot(`
                <i class="fas fa-times-circle" style="color:var(--accent);margin-left:6px;"></i>
                إجابة خاطئة. الصحيح:
                <span class="zh" style="margin-top:6px;font-size:24px;">${cw.zh}</span>
                <span class="py">${cw.py}</span>
                <span class="mn">${cw.ar}</span>
                <br>لا بأس، حاول مرة أخرى!
            `);
        }, 300);
    }
}

function switchCat(key, btn) {
    curCat = key; curIdx = 0; quizDone = false;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('chatTitle').textContent = DB[key].title;
    addUser('علّمني من: ' + DB[key].title);
    showWord(0);
}

// ============================
// أوامر سريعة
// ============================
function qa(type) {
    if (isProcessing) return;

    switch(type) {
        case 'next':
            curIdx = (curIdx + 1) % DB[curCat].words.length;
            showWord(curIdx);
            break;
        case 'prev':
            curIdx = (curIdx - 1 + DB[curCat].words.length) % DB[curCat].words.length;
            showWord(curIdx);
            break;
        case 'random': {
            const rCat = Object.keys(DB)[Math.floor(Math.random() * Object.keys(DB).length)];
            const rIdx = Math.floor(Math.random() * DB[rCat].words.length);
            curCat = rCat; curIdx = rIdx;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`[data-cat="${rCat}"]`);
            if (btn) btn.classList.add('active');
            document.getElementById('chatTitle').textContent = DB[rCat].title;
            addUser('كلمة عشوائية!');
            showWord(rIdx);
            break;
        }
        case 'quiz':
            startQuiz();
            break;
        case 'tones':
            addUser('اشرح لي النبرات الصينية');
            processInput('اشرح لي النبرات الصينية الأربع');
            break;
        case 'help':
            addUser('مساعدة');
            processInput('مساعدة');
            break;
    }
}

async function processInput(text) {
    if (isProcessing) return;
    const t = text.toLowerCase();

    // === كشف النص الصيني → نطق فوري + استفسار AI إن متصل ===
    const zhMatch = text.match(/[\u4e00-\u9fff]+/g);
    if (zhMatch) {
        const zhText = zhMatch.join(' ');
        speak(zhText);

        // بحث محلي أولاً
        let found = null;
        for (const key in DB) {
            const f = DB[key].words.find(w => zhText.includes(w.zh));
            if (f) { found = f; break; }
        }

        if (apiConnected) {
            // إرسال للـ AI للحصول على شرح أعمق
            setProcessing(true);
            showTyping();
            try {
                const aiReply = await callGemini(text);
                hideTyping();
                const formatted = formatAIResponse(aiReply);
                addBot(formatted, true);
                // نطق أول كلمة صينية في الرد
                const firstZh = aiReply.match(/【(.+?)】/);
                if (firstZh) speak(firstZh[1], false);
            } catch (e) {
                hideTyping();
                // fallback للوضع المحلي
                if (found) {
                    addBot(`وجدتها في قاعدتي:<span class="zh">${found.zh}</span><span class="py">${found.py}</span><span class="mn">${found.ar}</span><div class="note-box"><i class="fas fa-lightbulb"></i><span>${found.note}</span></div>`);
                } else {
                    addBot(`أنطقت: <span class="zh" style="font-size:28px;">${zhText}</span><br>هذه الكلمة غير موجودة في قاعدتي المحلية.`);
                }
                showToast('خطأ في AI: ' + e.message);
            }
            setProcessing(false);
        } else {
            // وضع محلي فقط
            showTyping();
            setTimeout(() => {
                hideTyping();
                if (found) {
                    addBot(`وجدتها في قاعدتي:<span class="zh">${found.zh}</span><span class="py">${found.py}</span><span class="mn">${found.ar}</span><div class="note-box"><i class="fas fa-lightbulb"></i><span>${found.note}</span></div>`);
                } else {
                    addBot(`أنطقت: <span class="zh" style="font-size:28px;">${zhText}</span><br><br>هذه الكلمة غير موجودة في قاعدتي بعد، لكنني نطقتها لك!<br><span style="color:var(--muted);font-size:11px;">ربط مع Gemini AI للحصول على شرح أي كلمة صينية</span>`);
                }
            }, 500);
        }
        return;
    }

    // === أوامر التنقل السريعة (دائماً محلية) ===
    if (/^(التالي|next|جديد|يلا)$/.test(t)) { qa('next'); return; }
    if (/^(السابق|prev|رجع|قبل)$/.test(t)) { qa('prev'); return; }
    if (/^(عشوائي|random)$/.test(t)) { qa('random'); return; }
    if (/^(اختبر|quiz|سؤال|امتحان)$/.test(t)) { qa('quiz'); return; }

    // === أوامر النطق السريع ===
    if (/^(انطق|نطق|speak|اقرأ)$/.test(t)) {
        if (lastWord) {
            speak(lastWord.zh);
            showToast('نطق: ' + lastWord.zh);
        } else {
            addBot('أرسل كلمة أو نص صيني أولاً وسأنطقه لك فوراً!');
        }
        return;
    }

    // === تصنيفات بالاسم ===
    for (const key in DB) {
        if (t.includes(DB[key].title)) {
            const btn = document.querySelector(`[data-cat="${key}"]`);
            switchCat(key, btn);
            return;
        }
    }

    // === كل شيء آخر → AI ===
    if (apiConnected) {
        setProcessing(true);
        showTyping();
        try {
            const aiReply = await callGemini(text);
            hideTyping();
            const formatted = formatAIResponse(aiReply);
            addBot(formatted, true);

            // نطق أي نص صيني في الرد
            const zhInReply = aiReply.match(/【(.+?)】/g);
            if (zhInReply && zhInReply.length > 0) {
                // نطق أول كلمة صينية فقط
                const first = zhInReply[0].slice(1, -1);
                if (first.length <= 10) speak(first, false);
            }

            // إضافة للكلمات المتعلمة
            if (zhInReply) {
                zhInReply.forEach(z => {
                    const clean = z.slice(1, -1);
                    if (clean.length <= 6) learned.add(clean);
                });
                updateStats();
            }
        } catch (e) {
            hideTyping();
            addBot(`<span style="color:var(--accent);">حدث خطأ في الاتصال بالـ AI:</span> ${escHtml(e.message)}<br><br>جرّب مرة أخرى أو استخدم الأزرار السريعة بالأسفل.`);
        }
        setProcessing(false);
    } else {
        // === Fallback ذكي بدون AI ===
        handleLocalFallback(text, t);
    }
}

        'ذهب': { zh: '去', py: 'qù' },
        'يعطي': { zh: '给', py: 'gěi' },
        'يشتري': { zh: '买', py: 'mǎi' },
        'يبيع': { zh: '卖', py: 'mài' },
        'يفهم': { zh: '明白', py: 'míng bai' },
        'يعرف': { zh: '知道', py: 'zhī dào' },
        'يفكر': { zh: '想', py: 'xiǎng' },
        'يحب': { zh: '喜欢', py: 'xǐ huān' },
        'يكره': { zh: '讨厌', py: 'tǎo yàn' },
        'ينتظر': { zh: '等', py: 'děng' },
    };

    // بحث في الترجمات المحلية
    let found = null;
    for (const key in arToZh) {
        if (t.includes(key)) {
            found = { ar: key, ...arToZh[key] };
            break;
        }
    }

    if (found) {
        speak(found.zh);
        learned.add(found.zh);
        updateStats();
        showTyping();
        setTimeout(() => {
            hideTyping();
            addBot(`
                ترجمة "<span class="hl">${found.ar}</span>":
                <span class="zh">${found.zh}</span>
                <span class="py">${found.py}</span>
                <br><span style="color:var(--muted);font-size:11px;">ربط مع Gemini AI لشرح أعمق وأمثلة أكثر</span>
            `);
        }, 400);
        return;
    }

    // النبرات
    if (/نبر|تون|tone|أصوات/.test(t)) {
        showTyping();
        setTimeout(() => {
            hideTyping();
            addBot(`
                <span class="hl">النبرات الصينية الأربع:</span><br><br>
                <span class="zh">ā</span> <span class="py">النبرة الأولى</span> — مستقيمة عالية، كأنك تقول "آه" مستنكراً<br>
                <span class="zh">á</span> <span class="py">النبرة الثانية</span> — تصاعدية، كأنك تسأل "أأأن؟"<br>
                <span class="zh">ǎ</span> <span class="py">النبرة الثالثة</span> — هابطة ثم صاعدة، كأنك تتشكك<br>
                <span class="zh">à</span> <span class="py">النبرة الرابعة</span> — هابطة حادة، كأنك تأمر "قف!"<br><br>
                <div class="note-box"><i class="fas fa-lightbulb"></i><span>النبرة تغيّر المعنى تماماً! مثلاً: mā (أم) و mǎ (حصان) و mà (يلعن) — نفس الحروف، نبرات مختلفة!</span></div>
            `);
            speak('ā á ǎ à');
        }, 400);
        return;
    }

    // المساعدة
    if (/مساعد|help|كيف|إزاي|شرح/.test(t)) {
        showTyping();
        setTimeout(() => {
            hideTyping();
            addBot(`
                <span class="hl">كيف تستخدم المعلم الذكي:</span><br><br>
                <strong>1. الترجمة:</strong> اكتب أي كلمة عربية وسأترجمها<br>
                <strong>2. النطق:</strong> أرسل أي نص صيني وسأنطقه فوراً<br>
                <strong>3. الدروس:</strong> استخدم القائمة الجانبية للتنقل بين التصنيفات<br>
                <strong>4. الاختبار:</strong> اضغط "اختبرني" أو اكتب "اختبر"<br>
                <strong>5. أسئلة حرة:</strong> اسأل أي شيء عن الصينية!<br><br>
                <div class="note-box"><i class="fas fa-microchip"></i><span><strong>لتفعيل الذكاء الاصطناعي:</strong> اضغط "ربط مع Gemini AI" في الشريط الجانبي، والصق مفتاح API مجاني من aistudio.google.com — بعدها سأفهم كل شيء وأجيب بذكاء!</span></div>
            `);
        }, 400);
        return;
    }

    // الشكر
    if (/شكر|ممتن|يسلمو/.test(t)) {
        speak('不客气');
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`<span class="zh">不客气！</span><span class="py">bù kè qi!</span> عفواً!`); }, 400);
        return;
    }

    // التحية
    if (/مرحب|هلا|سلام|أهلا|هاي|صباح|مساء/.test(t)) {
        speak('你好');
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`<span class="zh">你好！</span><span class="py">nǐ hǎo!</span> مرحباً! كيف يمكنني مساعدتك في الصينية اليوم؟`); }, 400);
        return;
    }

    // إحصائيات
    if (/كم.*كلم|كم.*تعلمت|إحصائي/.test(t)) {
        const total = Object.values(DB).reduce((s, c) => s + c.words.length, 0);
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`تعلّمت <span class="hl">${learned.size}</span> كلمة من أصل <span class="hl">${total}</span> كلمة في قاعدة البيانات المحلية. نطقت <span class="hl">${spoken}</span> مرة.`); }, 400);
        return;
    }

    // رد افتراضي
    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`
            لم أتمكن من الإجابة على هذا السؤال في الوضع المحلي.<br><br>
            <div class="note-box"><i class="fas fa-microchip"></i><span><strong>للحصول على إجابات ذكية على أي سؤال:</strong><br>1. اذهب إلى <span style="color:var(--cyan);">aistudio.google.com</span><br>2. أنشئ مفتاح API مجاني<br>3. اضغط "ربط مع Gemini AI" بالجانب والصق المفتاح<br><br>بعدها سأستطيع ترجمة أي كلمة، شرح أي قاعدة، والإجابة على أي سؤال عن الصينية!</span></div>
        `);
    }, 400);
}

// ============================
// الإحصائيات والتقدم
// ============================
function updateStats() {
    document.getElementById('sWords').textContent = learned.size;
    document.getElementById('sCorrect').textContent = correctCount;
    document.getElementById('sSpoken').textContent = spoken;
}

function updateProg() {
    const cat = DB[curCat];
    if (!cat) return;
    const learnedInCat = cat.words.filter(w => learned.has(w.zh)).length;
    const pct = (learnedInCat / cat.words.length) * 100;
    document.getElementById('progFill').style.width = pct + '%';
}

// ============================
// مسح المحادثة
// ============================
function clearChat() {
    msgs.innerHTML = '';
    conversationHistory = [];
    showToast('تم مسح المحادثة');
    // رسالة ترحيب
    setTimeout(() => {
        addBot(apiConnected
            ? '<div class="ai-badge"><i class="fas fa-microchip"></i> Gemini AI</div>مرحباً! أنا معلمك الذكي للصينية، مربوط بالذكاء الاصطناعي. اسألني أي شيء!'
            : 'مرحباً! أنا معلمك للصينية. اربطني بـ Gemini AI للحصول على إجابات ذكية، أو استخدم القائمة الجانبية للتعلم.'
        );
    }, 300);
}

// ============================
// الإشعارات
// ============================
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    document.getElementById('toastTxt').textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================
// حقل الإدخال - تكبير تلقائي + Enter
// ============================
const inp = document.getElementById('inp');
inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
});
inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
    }
});

// ============================
// بدء التشغيل
// ============================
(function init() {
    // رسالة ترحيب
    setTimeout(() => {
        if (apiConnected) {
            addBot(`
                <div class="ai-badge"><i class="fas fa-microchip"></i> Gemini AI</div>
                <span class="zh">你好！</span><span class="py">nǐ hǎo!</span><br>
                أنا معلمك الذكي للغة الصينية، <span class="hl">مربوط بالذكاء الاصطناعي</span>.<br><br>
                يمكنك الآن:<br>
                • ترجمة <strong>أي كلمة عربية</strong> إلى الصينية<br>
                • إرسال <strong>أي نص صيني</strong> وسأنطقه وأشرحه<br>
                • سؤالي عن <strong>القواعد والنبرات والثقافة</strong><br>
                • أو استخدام الدروس الجاهزة من القائمة الجانبية<br><br>
                جرب الآن! اكتب أي شيء...
            `, true);
            speak('你好');
        } else {
            addBot(`
                <span class="zh">你好！</span><span class="py">nǐ hǎo!</span><br>
                مرحباً بك في معلم الصينية الذكي!<br><br>
                يمكنك التنقل بين الدروس بالقائمة الجانبية، أو إرسال كلمات عربية/صينية.<br><br>
                <div class="note-box"><i class="fas fa-microchip"></i><span><strong>نصيحة:</strong> لتفعيل الذكاء الاصطناعي الكامل، اربط مع Gemini AI مجاناً:<br>
                1. اذهب إلى <span style="color:var(--cyan);">aistudio.google.com</span><br>
                2. أنشئ مفتاح API<br>
                3. اضغط "ربط مع Gemini AI" بالشريط الجانبي</span></div>
            `);
            speak('你好');
        }
    }, 600);

    showWord(0);
})();
</script>
