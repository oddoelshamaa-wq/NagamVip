<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلم الصينية الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080810;
            --bg2: #0e0e1a;
            --card: #151524;
            --card2: #1c1c30;
            --accent: #e63946;
            --accent-glow: rgba(230,57,70,0.25);
            --accent2: #f4a261;
            --gold: #e9c46a;
            --green: #2a9d8f;
            --cyan: #00b4d8;
            --fg: #f0f0f5;
            --fg2: #9999b0;
            --muted: #55556a;
            --border: #252540;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
        }

        /* === الخلفية === */
        .bg-effects {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            animation: orbFloat 18s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) {
            width: 500px; height: 500px; top: -15%; right: -10%;
            background: radial-gradient(circle, rgba(230,57,70,0.1), transparent 70%);
        }
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px; bottom: -10%; left: -5%;
            background: radial-gradient(circle, rgba(42,157,143,0.08), transparent 70%);
            animation-delay: -6s; animation-duration: 22s;
        }
        .bg-orb:nth-child(3) {
            width: 300px; height: 300px; top: 40%; left: 40%;
            background: radial-gradient(circle, rgba(233,196,106,0.05), transparent 70%);
            animation-delay: -12s; animation-duration: 25s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.15); }
            66% { transform: translate(-25px, 25px) scale(0.9); }
        }

        /* === شبكة خلفية === */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* === رموز عائمة === */
        .floating-chars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .float-char {
            position: absolute; font-family: 'Noto Sans SC', sans-serif;
            color: rgba(230,57,70,0.035); font-weight: 900;
            animation: charRise linear infinite;
        }
        @keyframes charRise {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            8% { opacity: 1; }
            92% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(15deg); opacity: 0; }
        }

        /* === التخطيط === */
        .app {
            position: relative; z-index: 1;
            display: flex; height: 100vh; max-width: 1500px; margin: 0 auto;
        }

        /* === الشريط الجانبي === */
        .sidebar {
            width: 300px; background: var(--bg2);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        .sidebar-head {
            padding: 28px 20px 20px; text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .logo-box {
            width: 72px; height: 72px; margin: 0 auto 14px;
            background: linear-gradient(135deg, var(--accent), #b71c1c);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Sans SC', sans-serif; font-size: 38px; font-weight: 900; color: #fff;
            box-shadow: 0 10px 40px var(--accent-glow);
            position: relative; overflow: hidden;
        }
        .logo-box::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
            animation: logoShine 4s ease-in-out infinite;
        }
        @keyframes logoShine {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .logo-title { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
        .logo-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

        /* === التصنيفات === */
        .cats { padding: 12px 10px; flex: 1; overflow-y: auto; }
        .cats::-webkit-scrollbar { width: 3px; }
        .cats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .cat-label {
            font-size: 10px; color: var(--muted); text-transform: uppercase;
            letter-spacing: 1.5px; padding: 10px 14px 6px; font-weight: 700;
        }

        .cat-btn {
            display: flex; align-items: center; gap: 11px; width: 100%;
            padding: 11px 13px; border: none; background: transparent;
            color: var(--fg2); font-family: 'Cairo', sans-serif; font-size: 13px;
            border-radius: 11px; cursor: pointer; transition: all 0.2s; margin-bottom: 3px;
            text-align: right;
        }
        .cat-btn:hover { background: var(--card); color: var(--fg); }
        .cat-btn.active {
            background: linear-gradient(135deg, rgba(230,57,70,0.12), rgba(230,57,70,0.04));
            color: var(--accent); font-weight: 700;
        }
        .cat-btn i {
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            background: var(--card); border-radius: 8px; font-size: 12px; flex-shrink: 0;
            transition: all 0.2s;
        }
        .cat-btn.active i { background: var(--accent); color: #fff; }

        .cat-count {
            margin-right: auto; font-size: 10px; background: var(--card);
            padding: 2px 7px; border-radius: 6px; color: var(--muted);
        }
        .cat-btn.active .cat-count { background: rgba(230,57,70,0.2); color: var(--accent); }

        /* === الإحصائيات === */
        .stats {
            padding: 14px 16px; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .stat {
            text-align: center; padding: 10px 4px;
            background: var(--card); border-radius: 10px;
        }
        .stat-n { font-size: 18px; font-weight: 900; color: var(--gold); }
        .stat-l { font-size: 9px; color: var(--muted); margin-top: 2px; }

        /* === المحادثة === */
        .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .chat-head {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(14,14,26,0.85); backdrop-filter: blur(24px);
            position: relative;
        }
        .chat-head h2 { font-size: 15px; font-weight: 700; }
        .chat-head .online {
            font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px;
        }
        .chat-head .online::before {
            content: ''; width: 6px; height: 6px; background: var(--green);
            border-radius: 50%; animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(42,157,143,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(42,157,143,0); }
        }

        .head-actions { display: flex; gap: 6px; }
        .h-btn {
            width: 36px; height: 36px; border: 1px solid var(--border);
            background: var(--card); color: var(--fg2); border-radius: 9px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 13px; transition: all 0.2s;
        }
        .h-btn:hover { border-color: var(--accent); color: var(--accent); }

        .progress-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--border);
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 3px; transition: width 0.5s ease; width: 0%;
        }

        /* === الرسائل === */
        .msgs {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        .msgs::-webkit-scrollbar { width: 4px; }
        .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg {
            display: flex; gap: 10px; max-width: 82%;
            animation: msgSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-av {
            width: 38px; height: 38px; border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; margin-top: 2px;
        }
        .msg.bot .msg-av { background: linear-gradient(135deg, var(--accent), #b71c1c); color: #fff; }
        .msg.user .msg-av { background: var(--card2); color: var(--fg2); }

        .msg-body {
            padding: 13px 16px; border-radius: 15px; line-height: 1.85; font-size: 13.5px;
        }
        .msg.bot .msg-body {
            background: var(--card); border: 1px solid var(--border); border-top-right-radius: 4px;
        }
        .msg.user .msg-body {
            background: linear-gradient(135deg, rgba(230,57,70,0.1), rgba(230,57,70,0.05));
            border: 1px solid rgba(230,57,70,0.15); border-top-left-radius: 4px;
        }

        .msg-body .zh {
            font-family: 'Noto Sans SC', sans-serif; font-size: 28px; font-weight: 900;
            color: var(--fg); display: block; margin-bottom: 4px; line-height: 1.3;
        }
        .msg-body .py { font-size: 14px; color: var(--accent2); font-style: italic; display: block; }
        .msg-body .mn { color: var(--fg2); font-size: 13px; }
        .msg-body .hl { color: var(--gold); font-weight: 700; }
        .msg-body .note-box {
            margin-top: 10px; padding: 10px 14px; background: rgba(233,196,106,0.06);
            border: 1px solid rgba(233,196,106,0.12); border-radius: 10px;
            font-size: 12px; color: var(--fg2); display: flex; gap: 8px; align-items: flex-start;
        }
        .msg-body .note-box i { color: var(--gold); margin-top: 2px; flex-shrink: 0; }

        /* === بطاقة الكلمة المحسّنة === */
        .wcard {
            background: var(--card2); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px; margin-top: 10px; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .wcard::before {
            content: ''; position: absolute; top: 0; right: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--accent), var(--accent2));
        }
        .wcard:hover {
            border-color: rgba(230,57,70,0.3); transform: translateX(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }
        .wcard.playing {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .wcard-top { display: flex; align-items: center; justify-content: space-between; }
        .wcard-char {
            font-family: 'Noto Sans SC', sans-serif; font-size: 42px; font-weight: 900; color: var(--fg);
            transition: transform 0.2s;
        }
        .wcard.playing .wcard-char { transform: scale(1.08); }
        .wcard-speak {
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--border);
            background: transparent; color: var(--accent); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            transition: all 0.25s; position: relative;
        }
        .wcard-speak:hover {
            background: var(--accent); color: #fff; border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .wcard-speak.speaking::after {
            content: ''; position: absolute; inset: -6px;
            border: 2px solid var(--accent); border-radius: 50%;
            animation: speakRing 1s ease-out infinite;
        }
        @keyframes speakRing {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .wcard-py { font-size: 15px; color: var(--accent2); margin-top: 6px; font-weight: 600; }
        .wcard-mn { font-size: 14px; color: var(--fg2); margin-top: 2px; }
        .wcard-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted);
        }
        .wcard-nav button {
            background: var(--card); border: 1px solid var(--border); color: var(--fg2);
            padding: 5px 12px; border-radius: 7px; font-family: 'Cairo', sans-serif;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .wcard-nav button:hover { border-color: var(--accent); color: var(--accent); }

        /* === الاختبار === */
        .quiz-opts { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }
        .q-opt {
            padding: 11px 14px; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; color: var(--fg); font-family: 'Cairo', sans-serif;
            font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: right;
            display: flex; align-items: center; gap: 10px;
        }
        .q-opt:hover { border-color: var(--gold); background: rgba(233,196,106,0.04); }
        .q-opt.correct { border-color: var(--green); background: rgba(42,157,143,0.12); color: var(--green); }
        .q-opt.wrong { border-color: var(--accent); background: rgba(230,57,70,0.08); color: var(--accent); }
        .q-opt.locked { pointer-events: none; }
        .q-num {
            width: 24px; height: 24px; border-radius: 6px; background: var(--card2);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; flex-shrink: 0;
        }
        .q-opt.correct .q-num { background: var(--green); color: #fff; }
        .q-opt.wrong .q-num { background: var(--accent); color: #fff; }

        /* === مؤشر الكتابة === */
        .typing { display: flex; gap: 5px; padding: 6px 2px; }
        .typing span {
            width: 7px; height: 7px; background: var(--green); border-radius: 50%;
            animation: tdot 1.2s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes tdot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* === الإدخال === */
        .input-area {
            padding: 14px 24px 20px; border-top: 1px solid var(--border);
            background: rgba(14,14,26,0.9); backdrop-filter: blur(24px);
        }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .inp {
            flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 13px;
            padding: 13px 16px; color: var(--fg); font-family: 'Cairo', sans-serif; font-size: 14px;
            resize: none; outline: none; min-height: 46px; max-height: 110px;
            transition: border-color 0.2s; line-height: 1.6;
        }
        .inp::placeholder { color: var(--muted); }
        .inp:focus { border-color: var(--accent); }

        .send {
            width: 46px; height: 46px; border-radius: 13px; border: none;
            background: linear-gradient(135deg, var(--accent), #b71c1c); color: #fff;
            font-size: 17px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; flex-shrink: 0;
        }
        .send:hover { transform: scale(1.06); box-shadow: 0 4px 24px var(--accent-glow); }
        .send:active { transform: scale(0.94); }

        .quick-row { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
        .qb {
            padding: 5px 13px; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; color: var(--fg2); font-family: 'Cairo', sans-serif;
            font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .qb:hover { border-color: var(--accent); color: var(--accent); }

        /* === الإشعار === */
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card2); border: 1px solid var(--border);
            padding: 10px 22px; border-radius: 11px; color: var(--fg); font-size: 13px;
            z-index: 999; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { color: var(--green); }

        /* === مؤشر النطق العائم === */
        .speak-float {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0);
            background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 30px;
            font-size: 13px; font-weight: 700; z-index: 100;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 30px var(--accent-glow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .speak-float.show { transform: translateX(-50%) scale(1); }

        /* === الاستجابة === */
        @media (max-width: 860px) {
            .sidebar { display: none; }
            .msgs { padding: 14px; }
            .input-area { padding: 10px 14px 14px; }
            .msg { max-width: 95%; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="bg-effects">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>
<div class="floating-chars" id="floatC"></div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastTxt"></span>
</div>

<div class="speak-float" id="speakFloat">
    <i class="fas fa-volume-high"></i>
    <span id="speakFloatTxt">جاري النطق...</span>
</div>

<div class="app">
    <!-- الشريط الجانبي -->
    <aside class="sidebar">
        <div class="sidebar-head">
            <div class="logo-box">语</div>
            <div class="logo-title">معلم الصينية الذكي</div>
            <div class="logo-sub">ينطق أي كلمة ترسلها</div>
        </div>
        <nav class="cats" id="catsNav">
            <div class="cat-label">الدروس</div>
        </nav>
        <div class="stats">
            <div class="stat">
                <div class="stat-n" id="sWords">0</div>
                <div class="stat-l">كلمة تعلّمتها</div>
            </div>
            <div class="stat">
                <div class="stat-n" id="sCorrect">0</div>
                <div class="stat-l">إجابة صحيحة</div>
            </div>
            <div class="stat">
                <div class="stat-n" id="sSpoken">0</div>
                <div class="stat-l">مرة نطق</div>
            </div>
        </div>
    </aside>

    <!-- المحادثة -->
    <main class="chat">
        <header class="chat-head">
            <div>
                <h2 id="chatTitle">التحيات والسلام</h2>
                <div class="online">متصل الآن</div>
            </div>
            <div class="head-actions">
                <button class="h-btn" onclick="clearChat()" title="مسح" aria-label="مسح المحادثة"><i class="fas fa-trash-can"></i></button>
                <button class="h-btn" onclick="repeatLast()" title="أعد النطق" aria-label="أعد النطق"><i class="fas fa-rotate-right"></i></button>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
        </header>

        <div class="msgs" id="msgs" role="log" aria-live="polite"></div>

        <div class="input-area">
            <div class="input-row">
                <textarea class="inp" id="inp" placeholder="اكتب أي شيء بالعربي أو الصيني وسأنطقه لك..." rows="1" aria-label="حقل الكتابة"></textarea>
                <button class="send" onclick="handleSend()" aria-label="إرسال"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="quick-row">
                <button class="qb" onclick="qa('next')">التالي</button>
                <button class="qb" onclick="qa('prev')">السابق</button>
                <button class="qb" onclick="qa('quiz')">اختبرني</button>
                <button class="qb" onclick="qa('random')">عشوائي</button>
                <button class="qb" onclick="qa('tones')">شرح النبرات</button>
                <button class="qb" onclick="qa('help')">مساعدة</button>
            </div>
        </div>
    </main>
</div>

<script>
// ============================
// قاعدة البيانات
// ============================
const DB = {
    greetings: {
        title: 'التحيات والسلام', icon: 'fa-hand-peace',
        words: [
            { zh: '你好', py: 'nǐ hǎo', ar: 'مرحباً', note: 'أشهر تحية في الصينية، تستخدم في أي وقت' },
            { zh: '早上好', py: 'zǎo shang hǎo', ar: 'صباح الخير', note: 'من الصباح حتى الظهر' },

// ============================
// النطق
// ============================
function speak(text, showFloat = true) {
    if (!text || !text.trim()) return;
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.trim());
        u.lang = 'zh-CN';
        u.rate = 0.75;
        u.pitch = 1;
        u.onstart = () => {
            spoken++;
            updateStats();
            // تأثير على البطاقة
            const card = document.querySelector('.wcard');
            if (card) { card.classList.add('playing'); }
            const btn = document.querySelector('.wcard-speak');
            if (btn) { btn.classList.add('speaking'); }
            if (showFloat) showSpeakFloat(text);
        };
        u.onend = () => {
            const card = document.querySelector('.wcard');
            if (card) { card.classList.remove('playing'); }
            const btn = document.querySelector('.wcard-speak');
            if (btn) { btn.classList.remove('speaking'); }
            hideSpeakFloat();
        };
        u.onerror = () => {
            const card = document.querySelector('.wcard');
            if (card) card.classList.remove('playing');
            hideSpeakFloat();
        };
        lastSpokenText = text.trim();
        window.speechSynthesis.speak(u);
    }
}

function showSpeakFloat(text) {
    const el = document.getElementById('speakFloat');
    document.getElementById('speakFloatTxt').textContent = text.length > 10 ? text.substring(0, 10) + '...' : text;
    el.classList.add('show');
}
function hideSpeakFloat() {
    document.getElementById('speakFloat').classList.remove('show');
}

function repeatLast() {
    if (lastSpokenText) {
        speak(lastSpokenText);
        showToast('أعد النطق: ' + lastSpokenText);
    } else {
        showToast('لا يوجد نص لنطقه بعد');
    }
}

function showTyping() {
    const d = document.createElement('div');
    d.className = 'msg bot'; d.id = 'typMsg';
    d.innerHTML = `<div class="msg-av"><i class="fas fa-robot"></i></div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;

function wcardHTML(w, idx, total) {
    return `
        <div class="wcard" onclick="speak('${w.zh}')" id="wc${idx}">
            <div class="wcard-top">
                <div>
                    <div class="wcard-char">${w.zh}</div>

                <button class="wcard-speak" onclick="event.stopPropagation(); speak('${w.zh}')" aria-label="انطق">
                    <i class="fas fa-volume-high"></i>
                </button>
            </div>
            <div class="note-box"><i class="fas fa-lightbulb"></i><span>${w.note}</span></div>

// ============================
// عرض كلمة
// ============================
function showWord(idx) {
    const cat = DB[curCat];
    if (!cat) return;
    idx = Math.max(0, Math.min(idx, cat.words.length - 1));
    curIdx = idx;
    const w = cat.words[idx];
    lastWord = w;
    quizDone = false;
    learned.add(w.zh);
    updateStats();
    updateProg();

    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`تعلّم كلمة من <span class="hl">${cat.title}</span>:${wcardHTML(w, idx, cat.words.length)}`);
    }, 500);
}

// ============================
// الاختبار
// ============================
function startQuiz() {
    quizDone = false;
    const cat = DB[curCat];
    const words = cat.words;
    const cw = words[Math.floor(Math.random() * words.length)];
    lastWord = cw;

    let opts = [cw];
    const rest = words.filter(w => w.zh !== cw.zh);
    while (opts.length < 4 && rest.length > 0) {
        const ri = Math.floor(Math.random() * rest.length);
        opts.push(rest.splice(ri, 1)[0]);
    }
    opts.sort(() => Math.random() - 0.5);

    const optsH = opts.map((o, i) => `
        <button class="q-opt" data-zh="${o.zh}" onclick="checkQuiz(this,'${o.zh}','${cw.zh}')">
            <span class="q-num">${'أبجـ'[i]}</span>
            <span>${o.ar}</span>
        </button>
    `).join('');

    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`
            <div style="margin-bottom:6px;">ما معنى هذه الكلمة؟</div>
            <span class="zh" style="font-size:32px;">${cw.zh}</span>
            <span class="py">${cw.py}</span>
            <div class="quiz-opts">${optsH}</div>
        `);
    }, 700);
}

function checkQuiz(btn, sel, cor) {
    if (quizDone) return;
    quizDone = true;
    document.querySelectorAll('.q-opt').forEach(b => {
        b.classList.add('locked');
        if (b.dataset.zh === cor) b.classList.add('correct');
    });

    if (sel === cor) {
        btn.classList.add('correct');
        correct++;
        learned.add(cor);
        speak(cor);
        updateStats();
        setTimeout(() => {
            addBot(`<i class="fas fa-check-circle" style="color:var(--green);margin-left:6px;"></i> <span class="hl">إجابة صحيحة!</span> أحسنت، استمر في التعلّم!`);
        }, 300);
    } else {
        btn.classList.add('wrong');
        const cw = DB[curCat].words.find(w => w.zh === cor);
        speak(cor);
        setTimeout(() => {
            addBot(`
                <i class="fas fa-times-circle" style="color:var(--accent);margin-left:6px;"></i>
                إجابة خاطئة. الصحيح:
                <span class="zh" style="margin-top:6px;font-size:24px;">${cw.zh}</span>
                <span class="py">${cw.py}</span>
                <span class="mn">${cw.ar}</span>
                <br>لا بأس، حاول مرة أخرى!
            `);
        }, 300);
    }
}

function switchCat(key, btn) {
    curCat = key; curIdx = 0; quizDone = false;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('chatTitle').textContent = DB[key].title;
    addUser('علّمني من: ' + DB[key].title);
    showWord(0);
}

// ============================
// معالجة الإدخال الذكية
// ============================
function handleSend() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = ''; inp.style.height = 'auto';
    addUser(text);
    processInput(text);
}

function processInput(text) {
    const t = text.toLowerCase();

    // === كشف النص الصيني ===
    const zhMatch = text.match(/[\u4e00-\u9fff]+/g);
    if (zhMatch) {
        const zhText = zhMatch.join('');
        speak(zhText);

        // بحث في قاعدة البيانات
        let found = null;
        for (const key in DB) {
            const f = DB[key].words.find(w => w.zh === zhText);
            if (f) { found = f; break; }
        }

        showTyping();
        setTimeout(() => {
            hideTyping();
            if (found) {
                addBot(`
                    هذه الكلمة موجودة في قاعدتي:
                    <span class="zh">${found.zh}</span>
                    <span class="py">${found.py}</span>
                    <span class="mn">${found.ar}</span>
                    <div class="note-box"><i class="fas fa-lightbulb"></i><span>${found.note}</span></div>
                `);
            } else {
                addBot(`
                    أنطقت: <span class="zh" style="font-size:28px;">${zhText}</span>
                    <br><br>
                    هذه الكلمة غير موجودة في قاعدة بياناتي بعد، لكنني نطقتها لك بالصينية الصحيحة!
                    <br>يمكنك إرسال أي نص صيني وسأنطقه فوراً.
                `);
            }
        }, 600);
        return;
    }

    // === أوامر التنقل ===
    if (/التالي|next|جديد|يلا|عادى/.test(t)) { qa('next'); return; }
    if (/السابق|prev|رجع|قبل/.test(t)) { qa('prev'); return; }
    if (/عشوائي|random|صدف/.test(t)) { qa('random'); return; }

    // === أوامر الاختبار ===
    if (/اختبر|quiz|سؤال|أسئلة|امتحان/.test(t)) { qa('quiz'); return; }

    // === النطق ===
    if (/انطق|نطق|speak|اقرأ|اقراء/.test(t)) {
        if (lastWord) {
            speak(lastWord.zh);
            showToast('نطق: ' + lastWord.zh);
        } else {
            showTyping();
            setTimeout(() => { hideTyping(); addBot('أرسل كلمة أو نص صيني أولاً وسأنطقه لك فوراً!'); }, 400);
        }
        return;
    }

    // === النبرات ===
    if (/نبر|تون|tone|أصوات/.test(t)) { qa('tones'); return; }

    // === المساعدة ===
    if (/مساعد|help|كيف|إزاي|شرح/.test(t)) { qa('help'); return; }

    // === الشكر ===
    if (/شكر|ممتن|يسلمو|شكرا/.test(t)) {
        speak('不客气');
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`<span class="zh">不客气！</span><span class="py">bù kè qi!</span><span class="mn">عفواً! أنا هنا دائماً.</span>`); }, 400);
        return;
    }

    // === التحية ===
    if (/مرحب|هلا|سلام|أهلا|هاي|صباح|مساء/.test(t)) {
        speak('你好');
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`<span class="zh">你好！</span><span class="py">nǐ hǎo!</span><span class="mn">مرحباً! أنا معلمك الذكي. أرسل أي شيء وسأنطقه لك!</span>`); }, 400);
        return;
    }

    // === عدد الكلمات ===
    if (/كم.*كلم|كم.*تعلمت|إحصائي/.test(t)) {
        const total = Object.values(DB).reduce((s, c) => s + c.words.length, 0);
        showTyping();
        setTimeout(() => { hideTyping(); addBot(`تعلّمت <span class="hl">${learned.size}</span> كلمة من أصل <span class="hl">${total}</span> كلمة. نطقت <span class="hl">${spoken}</span> مرة.`); }, 400);
        return;
    }

    // === تصنيفات بالاسم ===
    for (const key in DB) {
        if (t.includes(DB[key].title) || t.includes(key)) {
            const btn = document.querySelector(`[data-cat="${key}"]`);
            switchCat(key, btn);
            return;
        }
    }

    // === محاولة ترجمة عربي → صيني ===
    const translation = findArabicTranslation(text);
    if (translation) {
        speak(translation.zh);
        showTyping();
        setTimeout(() => {
            hideTyping();
            addBot(`
                ترجمة "<span class="hl">${text}</span>" إلى الصينية:
                <span class="zh">${translation.zh}</span>
                <span class="py">${translation.py}</span>
                <span class="mn">${translation.ar}</span>
            `);
        }, 500);
        return;
    }

    // === رد افتراضي ===
    showTyping();
    setTimeout(() => {
        hideTyping();
        addBot(`
            لم أتعرف على هذا الطلب تحديداً. جرّب:
            <br>• أرسل <strong>نص صيني</strong> وسأنطقه فوراً
            <br>• اكتب كلمة <strong>عربية</strong> مثل "شكراً" أو "مرحباً"
            <br>• اكتب <strong>"مساعدة"</strong> لكل الأوامر
        `);
    }, 400);
}

function findArabicTranslation(text) {
    // تطابق كامل
    if (arToZh[text]) return arToZh[text];
    // تطابق جزئي
    for (const key in arToZh) {
        if (text.includes(key) && key.length >= 2) return arToZh[key];
    }
    return null;
}

// ============================
function qa(action) {
    switch (action) {
        case 'next':
            addUser('الكلمة التالية');
            if (curCat && DB[curCat]) {
                curIdx = (curIdx + 1) % DB[curCat].words.length;
                showWord(curIdx);
            }
            break;
        case 'prev':
            addUser('الكلمة السابقة');
            if (curCat && DB[curCat]) {
                curIdx = (curIdx - 1 + DB[curCat].words.length) % DB[curCat].words.length;
                showWord(curIdx);
            }
            break;
        case 'random':
            addUser('كلمة عشوائية');
            const cats = Object.keys(DB);
            const rc = cats[Math.floor(Math.random() * cats.length)];
            curCat = rc;
            curIdx = Math.floor(Math.random() * DB[rc].words.length);
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const rb = document.querySelector(`[data-cat="${rc}"]`);
            if (rb) rb.classList.add('active');
            document.getElementById('chatTitle').textContent = DB[rc].title;
            showWord(curIdx);
            break;
        case 'quiz':
            addUser('اختبرني');
            startQuiz();
            break;
        case 'tones':
            addUser('شرح النبرات');
            showTyping();
            setTimeout(() => {
                hideTyping();
                addBot(`

function updateProg() {

    const p = ((curIdx + 1) / cat.words.length) * 100;
    document.getElementById('progFill').style.width = p + '%';

    const t = document.getElementById('toast');
    document.getElementById('toastTxt').textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}
